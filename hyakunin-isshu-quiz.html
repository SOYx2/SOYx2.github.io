<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <title>百人一首クイズ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "MS Mincho", serif;
      background: #1a0a0a;
      color: #e8d5b7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      text-align: center;
      padding: 30px 20px 10px;
    }

    header h1 {
      font-size: 2rem;
      color: #c8a45a;
      letter-spacing: 0.3em;
      margin-bottom: 6px;
    }

    header p {
      font-size: 0.9rem;
      color: #8a7a6a;
    }

    .score-bar {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 12px 20px;
      font-size: 1rem;
      color: #c8a45a;
    }

    .score-bar span {
      letter-spacing: 0.1em;
    }

    #quiz-area {
      width: 90%;
      max-width: 600px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0 40px;
    }

    .kami-no-ku {
      background: linear-gradient(135deg, #2a1a10, #1e1208);
      border: 1px solid #c8a45a44;
      border-radius: 12px;
      padding: 30px 24px;
      margin-bottom: 24px;
      width: 100%;
      text-align: center;
      position: relative;
    }

    .kami-no-ku::before {
      content: "上の句";
      position: absolute;
      top: -12px;
      left: 20px;
      background: #1a0a0a;
      padding: 0 10px;
      font-size: 0.8rem;
      color: #c8a45a;
    }

    .kami-no-ku p {
      font-size: 1.5rem;
      line-height: 1.8;
      letter-spacing: 0.15em;
    }

    .shimo-label {
      font-size: 0.9rem;
      color: #8a7a6a;
      margin-bottom: 12px;
      letter-spacing: 0.2em;
    }

    .choices {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .choice-btn {
      background: #2a1a10;
      border: 1px solid #c8a45a44;
      border-radius: 8px;
      padding: 16px 20px;
      color: #e8d5b7;
      font-family: inherit;
      font-size: 1.1rem;
      cursor: pointer;
      text-align: left;
      transition: background 0.2s, border-color 0.2s;
      letter-spacing: 0.1em;
      line-height: 1.6;
    }

    .choice-btn:hover {
      background: #3a2a1a;
      border-color: #c8a45a88;
    }

    .choice-btn:disabled {
      cursor: default;
    }

    .choice-btn.correct {
      background: #1a3a1a;
      border-color: #4a8a4a;
      color: #8fdf8f;
    }

    .choice-btn.wrong {
      background: #3a1a1a;
      border-color: #8a4a4a;
      color: #df8f8f;
    }

    .result-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .result-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .result-message {
      font-size: 3rem;
      font-weight: bold;
      letter-spacing: 0.3em;
      text-shadow: 0 0 30px currentColor;
      animation: popIn 0.4s ease-out;
    }

    .result-message.correct {
      color: #c8a45a;
    }

    .result-message.wrong {
      color: #8a4a4a;
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .poem-info {
      width: 100%;
      background: #2a1a10;
      border: 1px solid #c8a45a44;
      border-radius: 8px;
      padding: 16px 20px;
      margin-top: 16px;
      display: none;
      line-height: 1.8;
    }

    .poem-info .author {
      color: #c8a45a;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }

    .poem-info .full-poem {
      font-size: 1rem;
      color: #e8d5b7;
    }

    .next-btn {
      margin-top: 20px;
      background: #c8a45a;
      color: #1a0a0a;
      border: none;
      border-radius: 8px;
      padding: 12px 40px;
      font-family: inherit;
      font-size: 1.1rem;
      cursor: pointer;
      letter-spacing: 0.2em;
      display: none;
      transition: background 0.2s;
    }

    .next-btn:hover {
      background: #d8b46a;
    }

    .progress {
      font-size: 0.85rem;
      color: #8a7a6a;
      margin-bottom: 16px;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .kami-no-ku p { font-size: 1.2rem; }
      .choice-btn { font-size: 1rem; padding: 14px 16px; }
      .result-message { font-size: 2.2rem; }
    }
  </style>
</head>

  {kami:"来ぬ人を まつほの浦の 夕なぎに", shimo:"焼くや藻塩の 身もこがれつつ", author:"権中納言定家"},
  {kami:"風そよぐ ならの小川の 夕暮は", shimo:"みそぎぞ夏の しるしなりける", author:"従二位家隆"},
  {kami:"人も惜し 人も恨めし あぢきなく", shimo:"世を思ふゆゑに 物思ふ身は", author:"後鳥羽院"},
  {kami:"ももしきや 古き軒端の しのぶにも", shimo:"なほあまりある 昔なりけり", author:"順徳院"},
];

let usedIndices = [];
let correctCount = 0;
let wrongCount = 0;
let totalQuestions = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getUniqueRandomIndices(correctIdx, count, max) {
  const indices = new Set([correctIdx]);
  while (indices.size < count) {
    const r = Math.floor(Math.random() * max);
    if (r !== correctIdx) indices.add(r);
  }
  return [...indices];
}

function showQuestion() {
  answered = false;
  totalQuestions++;

  if (usedIndices.length >= poems.length) {
    usedIndices = [];
  }

  let idx;
  do {
    idx = Math.floor(Math.random() * poems.length);
  } while (usedIndices.includes(idx));
  usedIndices.push(idx);

  const poem = poems[idx];
  document.getElementById("kami-no-ku-text").textContent = poem.kami;
  document.getElementById("progress").textContent = `第${totalQuestions}問`;

  const choiceIndices = shuffle(getUniqueRandomIndices(idx, 4, poems.length));
  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";

  choiceIndices.forEach(ci => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = poems[ci].shimo;
    btn.addEventListener("click", () => handleAnswer(btn, ci, idx));
    choicesEl.appendChild(btn);
  });

  document.getElementById("poem-info").style.display = "none";
  document.getElementById("next-btn").style.display = "none";
}

function handleAnswer(btn, selectedIdx, correctIdx) {
  if (answered) return;
  answered = true;

  const buttons = document.querySelectorAll(".choice-btn");
  const isCorrect = selectedIdx === correctIdx;

  buttons.forEach(b => {
    b.disabled = true;
    const bIdx = [...document.getElementById("choices").children].indexOf(b);
    const choiceIdx = getChoiceIndex(b);
    if (b.textContent === poems[correctIdx].shimo) {
      b.classList.add("correct");
    }
  });

  if (isCorrect) {
    correctCount++;
    document.getElementById("correct-count").textContent = correctCount;
    showResult("お見事", "correct");
  } else {
    wrongCount++;
    document.getElementById("wrong-count").textContent = wrongCount;
    btn.classList.add("wrong");
    showResult("お手つき", "wrong");
  }

  const poem = poems[correctIdx];
  const infoEl = document.getElementById("poem-info");
  document.getElementById("poem-author").textContent = `— ${poem.author}`;
  document.getElementById("poem-full").textContent = `${poem.kami} ${poem.shimo}`;
  infoEl.style.display = "block";

  document.getElementById("next-btn").style.display = "inline-block";
}

function getChoiceIndex(btn) {
  return parseInt(btn.dataset.index);
}

function showResult(text, type) {
  const overlay = document.getElementById("result-overlay");
  const msg = document.getElementById("result-message");
  msg.textContent = text;
  msg.className = "result-message " + type;
  overlay.classList.add("show");
  setTimeout(() => overlay.classList.remove("show"), 1200);
}

document.getElementById("next-btn").addEventListener("click", showQuestion);

showQuestion();
</script>
